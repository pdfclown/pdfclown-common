#
# On commit push or pull request events, verifies the project builds successfully, then submits its
# Dependency Snapshot (commit push only).
#
name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    uses: pdfclown/.github/.github/workflows/build.yml@5f6a086ad568b33303206bfca6d746d3f9015e74
    permissions:
      contents: write
      security-events: write
    secrets: inherit
