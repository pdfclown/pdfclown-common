#
# On commit push or pull request events, verifies the project builds successfully, then submits its
# Dependency Snapshot (commit push only).
#
name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    uses: pdfclown/.github/.github/workflows/build.yml@e29b0a9df66c50763f8b3e157bfb811e71088e6e
    permissions:
      contents: write
      security-events: write
    secrets: inherit
