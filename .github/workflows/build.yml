#
# On commit push or pull request events, verifies the project builds successfully on JDK 17, 21, 25.
# If so, its Dependency Snapshot is submitted.
#
name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    uses: pdfclown/.github/.github/workflows/build.yml@13af571d3e068b7616aa250717425665c236f90e
    permissions:
      contents: write
      security-events: write
    secrets: inherit
