#
# On pull request events, verifies the PR conforms to project conventions.
#
name: Pull Request

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited

jobs:
  main:
    uses: pdfclown/.github/.github/workflows/pull-request.yml@e29b0a9df66c50763f8b3e157bfb811e71088e6e
    permissions:
      pull-requests: read
    secrets: inherit
