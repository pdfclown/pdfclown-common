#
# On pull request events, verifies the PR conforms to project conventions.
#
name: Pull Request

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited

jobs:
  main:
    uses: pdfclown/.github/.github/workflows/pull-request.yml@b04b5e473b6bce73799d816546863412d99fbd1f
    permissions:
      pull-requests: read
    secrets: inherit
